##
## ## Keybind / Application / Launcher
##

# bind=Alt,space,spawn,fuzzel

## rofi
bind=ALT+SHIFT,d,spawn,rofi -config ~/.config/mango/rofi/config.rasi -show drun
bind=ALT+SHIFT,r,spawn,rofi -config ~/.config/mango/rofi/config.rasi -show rrun




##
## ## Keybind / Application / Terminal
##

bind=ALT,Return,spawn,xfce4-terminal
bind=ALT+SHIFT,a,spawn,xfce4-terminal
bind=ALT+CTRL,a,spawn,foot
bind=ALT+SHIFT,t,spawn,sakura
bind=ALT+CTRL,t,spawn,kitty




##
## ## Keybind / Application / Fav
##

bind=ALT+SHIFT,f,spawn,thunar
bind=ALT+SHIFT,g,spawn,pcmanfm
bind=ALT+SHIFT,e,spawn,mousepad
bind=ALT+SHIFT,b,spawn,firefox --new-tab about:blank
bind=ALT+SHIFT,v,spawn,pavucontrol
bind=ALT+SHIFT,n,spawn,kitty --class 'nmtui' --title 'Network Settings' nmtui




##
## ## Keybind / Window / Close
##

# killclient SUPER+q
# bind=ALT,code:24,killclient,
# bind=ALT,q,killclient,
bind=SUPER,q,killclient




##
## ## Keybind / Window / Focus
##

## switch window focus
bind=SUPER,a,focusstack,next
bind=SUPER,s,focusstack,prev
bind=SUPER,z,focuslast
#bind=SUPER,Tab,focusstack,next
#bind=SUPER,u,focuslast
bind=ALT,Left,focusdir,left
bind=ALT,Right,focusdir,right
bind=ALT,Up,focusdir,up
bind=ALT,Down,focusdir,down




##
## ## Keybind / Window / Swap
##

## swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right




##
## ## Keybind / Window / Move
##

# movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0




##
## ## Keybind / Window / Reszie
##

# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0




##
## ## Keybind / Window / Status
##

# switch window status
bind=SUPER,g,toggleglobal
bind=ALT,Tab,toggleoverview,0
bind=SUPER,Escape,togglefloating
bind=ALT,backslash,togglefloating
bind=SUPER,w,togglemaximizescreen
bind=SUPER,f,togglefullscreen
bind=SUPER+SHIFT,f,togglefakefullscreen
bind=SUPER,x,minimized
bind=SUPER+CTRL,x,restore_minimized
bind=SUPER,o,toggleoverlay
bind=ALT,z,toggle_scratchpad




##
## ## Keybind / Layout
##

# switch layout
bind=SUPER+ALT,t,setlayout,tile
bind=SUPER+ALT,s,setlayout,scroller
bind=SUPER+ALT,n,switch_layout

# scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,

# tile layout
bind=SUPER,i,incnmaster,1
bind=SUPER,u,incnmaster,-1
bind=ALT,s,zoom,




